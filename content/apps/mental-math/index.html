<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Mental Math</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body class="screen-setup">

<header class="app-header">
    <a class="brand" href="../../../index.html"><span class="brand-back">←</span><span class="brand-name" data-i18n="appTitle">Mental Math</span></a>
    <div class="lang-toggle" role="group" aria-label="Language">
        <button type="button" class="lang-btn is-active" data-lang="en">EN</button>
        <button type="button" class="lang-btn" data-lang="es">ES</button>
    </div>
</header>

<main class="screen screen-setup-view">
    <div class="card setup-card">
        <button type="button" class="quick-mode" id="quickModeBtn">
            <span class="quick-label" data-i18n="quickMode">Play</span>
            <span class="quick-sub" data-i18n="quickSub">10 times-table problems</span>
        </button>

        <button type="button" class="customize-toggle" id="customizeToggle" aria-expanded="false" aria-controls="customizePanel">
            <span data-i18n="customize">Customize</span>
            <span class="chevron" aria-hidden="true">▾</span>
        </button>

        <div class="customize-panel" id="customizePanel" hidden>
            <div class="opt-group">
                <label data-i18n="pickMath">What to practice</label>
                <div class="opt-row op-row" data-key="mode">
                    <button type="button" class="opt-btn is-active" data-value="multiply"><span class="op-sym">×</span><span data-i18n="multiply">Times</span></button>
                    <button type="button" class="opt-btn" data-value="add"><span class="op-sym">+</span><span data-i18n="add">Plus</span></button>
                    <button type="button" class="opt-btn" data-value="subtract"><span class="op-sym">−</span><span data-i18n="subtract">Minus</span></button>
                    <button type="button" class="opt-btn" data-value="divide"><span class="op-sym">÷</span><span data-i18n="divide">Divide</span></button>
                    <button type="button" class="opt-btn" data-value="mixed"><span class="op-sym">⁂</span><span data-i18n="mixed">Mixed</span></button>
                </div>
            </div>

            <div class="opt-group">
                <label data-i18n="pickLevel">Level</label>
                <div class="opt-row diff-row" data-key="difficulty">
                    <button type="button" class="opt-btn" data-value="easy"><span class="diff-stars">★</span><span data-i18n="easy">Easy</span></button>
                    <button type="button" class="opt-btn is-active" data-value="medium"><span class="diff-stars">★★</span><span data-i18n="medium">Medium</span></button>
                    <button type="button" class="opt-btn" data-value="hard"><span class="diff-stars">★★★</span><span data-i18n="hard">Hard</span></button>
                </div>
            </div>

            <div class="opt-group">
                <label data-i18n="howClose">Scoring</label>
                <div class="opt-row" data-key="precision">
                    <button type="button" class="opt-btn is-active" data-value="exact" data-i18n="exact">Exact</button>
                    <button type="button" class="opt-btn" data-value="rough" data-i18n="rough">Good enough</button>
                </div>
            </div>

            <div class="opt-group">
                <label data-i18n="howMany">Length</label>
                <div class="opt-row" data-key="count">
                    <button type="button" class="opt-btn" data-value="5">5</button>
                    <button type="button" class="opt-btn is-active" data-value="10">10</button>
                    <button type="button" class="opt-btn" data-value="20">20</button>
                    <button type="button" class="opt-btn" data-value="50">50</button>
                </div>
            </div>

            <button type="button" class="start-btn" id="startBtn" data-i18n="start">Start</button>
        </div>
    </div>
</main>

<main class="screen screen-game-view">
    <div class="game-top">
        <button type="button" class="quit-btn" id="quitBtn" aria-label="Quit">✕</button>
        <div class="progress-bar" aria-label="Progress"><div class="progress-fill" id="progressFill"></div></div>
        <div class="streak" id="streak"><span class="streak-icon">⭐</span><span id="streakCount">0</span></div>
    </div>
    <div class="problem-wrap">
        <div class="problem" id="problem"><span id="problemText">7 × 8</span><span class="eq"> = </span><span class="qmark">?</span></div>
    </div>
    <form class="answer-form" id="answerForm" autocomplete="off">
        <input type="text" id="answerInput" inputmode="numeric" pattern="-?[0-9]*" autocomplete="off" aria-label="Your answer">
        <button type="submit" class="submit-btn" id="submitBtn" data-i18n="submit">Go</button>
    </form>
    <div class="result-overlay" id="resultOverlay" aria-live="polite">
        <div class="result-card">
            <span class="confetti"></span><span class="confetti"></span><span class="confetti"></span><span class="confetti"></span>
            <span class="confetti"></span><span class="confetti"></span><span class="confetti"></span><span class="confetti"></span>
            <div class="result-icon" id="resultIcon">✓</div>
            <div class="result-text" id="resultText"></div>
            <div class="result-time" id="resultTime"></div>
            <div class="result-tap" data-i18n="tapToContinue">Tap to continue</div>
        </div>
    </div>
</main>

<main class="screen screen-scoreboard-view">
    <div class="card scoreboard-card">
        <div class="score-stars" id="scoreStars">
            <span class="star">★</span><span class="star">★</span><span class="star">★</span>
        </div>
        <h1 data-i18n="results">Nice work</h1>
        <div class="score-blurb" id="scoreBlurb" data-i18n="scoreBlurb">Here's how you did.</div>
        <div class="stats">
            <div class="stat-row"><span data-i18n="accuracy">Score</span><span id="statAccuracy">0%</span></div>
            <div class="stat-row"><span data-i18n="bestStreak">Best streak</span><span id="statStreak">0</span></div>
            <div class="stat-row"><span data-i18n="totalTime">Total time</span><span id="statTotal">0.0s</span></div>
            <div class="stat-row"><span data-i18n="avgTime">Average</span><span id="statAvg">0.0s</span></div>
            <div class="stat-row"><span data-i18n="fastest">Fastest</span><span id="statFast">0.0s</span></div>
        </div>
        <details class="per-problem">
            <summary data-i18n="seeAllProblems">See all problems</summary>
            <ul id="problemList"></ul>
        </details>
        <div class="end-buttons">
            <button type="button" class="primary-btn" id="playAgainBtn" data-i18n="playAgain">Play again</button>
            <button type="button" class="secondary-btn" id="menuBtn" data-i18n="menu">Menu</button>
        </div>
    </div>
</main>

<script src="script.js"></script>
</body>
</html>
