<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#fbf7ec">
    <title>Habits</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Checklist screen -->
<section class="screen is-active" data-screen="checklist">
    <header class="app-header">
        <a class="brand" href="../../../index.html" aria-label="Back to rishi verma">‹</a>
        <h1 class="brand-title">Habits</h1>
        <div class="header-actions">
            <button type="button" id="statsBtn" class="icon-btn" aria-label="Statistics">
                <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
                    <line x1="4"  y1="20" x2="4"  y2="11" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                    <line x1="11" y1="20" x2="11" y2="6"  stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                    <line x1="18" y1="20" x2="18" y2="14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                </svg>
            </button>
            <button type="button" id="editBtn" class="icon-btn" aria-label="Edit habits">
                <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
                    <path d="M3 21 L7 20 L20 7 L17 4 L4 17 Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </header>

    <div class="date-bar">
        <button type="button" id="dayPrev" class="icon-btn day-arrow" aria-label="Previous day">‹</button>
        <div class="date-display">
            <div id="dateMain" class="date-main"></div>
            <div id="dateSub"  class="date-sub"></div>
            <button type="button" id="todayBtn" class="today-btn" hidden>↩ today</button>
        </div>
        <button type="button" id="dayNext" class="icon-btn day-arrow" aria-label="Next day">›</button>
    </div>

    <div class="sheet">
        <div class="column-head">
            <div class="col-name">Name</div>
            <div class="col-count">Count</div>
        </div>
        <div id="habitList" class="habit-list"></div>
        <p class="sheet-hint">tap to add &middot; long-press to subtract</p>
    </div>
</section>

<!-- Edit screen -->
<section class="screen" data-screen="edit">
    <header class="app-header">
        <button type="button" id="editDone" class="brand" aria-label="Done editing">‹</button>
        <h1 class="brand-title">Edit habits</h1>
        <div class="header-actions"></div>
    </header>

    <div id="editList" class="edit-list"></div>

    <div class="edit-footer">
        <button type="button" id="addHabitBtn" class="add-btn">+ Add habit</button>
    </div>
</section>

<!-- Stats screen -->
<section class="screen" data-screen="stats">
    <header class="app-header">
        <button type="button" id="statsDone" class="brand" aria-label="Back">‹</button>
        <h1 class="brand-title">Statistics</h1>
        <div class="header-actions"></div>
    </header>

    <div class="stats-body">
        <section id="statsOverall" class="stats-overall"></section>
        <div id="statsList" class="stats-list"></div>
        <p class="stats-footnote">
            Days with no entries are excluded from these stats.
        </p>
    </div>
</section>

<script src="script.js"></script>
</body>
</html>
