<!DOCTYPE html>
<!-- Mobility Choices — riverma.github.io
     NOTE: This app uses ES modules. Serve it (e.g. `python3 -m http.server`) — opening
     index.html via file:// will fail because browsers block module fetches from local files. -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ff6b35">
    <title>Mobility Choices</title>

    <link rel="stylesheet" href="vendor/leaflet/leaflet.css">
    <link rel="stylesheet" href="style.css">
    <script src="vendor/leaflet/leaflet.js" defer></script>
</head>
<body>

<!-- Main screen -->
<section class="mc-screen is-active" data-screen="main">
    <header class="mc-app-header">
        <h1 class="mc-h1">Mobility Choices</h1>
        <nav class="mc-header-actions">
            <button type="button" class="mc-icon-btn" data-go="about"    data-icon="info"  aria-label="About & methodology" title="About"></button>
            <button type="button" class="mc-icon-btn" data-go="credits"  data-icon="heart" aria-label="Credits" title="Credits"></button>
            <button type="button" class="mc-icon-btn" data-go="settings" data-icon="gear"  aria-label="Settings" title="Settings"></button>
        </nav>
    </header>

    <div class="mc-search-block" id="searchBlock"></div>

    <div class="mc-actions">
        <button type="button" class="mc-btn-primary" id="compareBtn" disabled>
            <span>Compare routes</span>
            <span data-icon="arrowRight" aria-hidden="true"></span>
        </button>
    </div>

    <div class="mc-banner" id="banner" hidden></div>

    <div class="mc-map-wrap">
        <div id="map" class="mc-map" aria-label="Map showing routes"></div>
    </div>

    <div class="mc-results" id="results"></div>
</section>

<!-- Settings screen -->
<section class="mc-screen" data-screen="settings" id="settingsScreen"></section>

<!-- About screen -->
<section class="mc-screen" data-screen="about" id="aboutScreen"></section>

<!-- Credits screen -->
<section class="mc-screen" data-screen="credits" id="creditsScreen"></section>

<script type="module" src="js/main.js"></script>
</body>
</html>
